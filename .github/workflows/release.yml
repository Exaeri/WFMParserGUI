name: Release WFMParserGUI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (example: v1.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Ensure release tag exists
        shell: bash
        run: |
          if ! git rev-parse "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag '$RELEASE_TAG' was not found in the repository."
            exit 1
          fi

      - name: Checkout release tag
        run: git checkout "$env:RELEASE_TAG"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Install WFMarketApiJS dependencies
        run: npm install
        working-directory: WFMarketApiJS

      - name: Build packaged app
        run: npm run package

      - name: Archive packaged build
        shell: powershell
        run: |
          Compress-Archive -Path "out/wfmarketparser-win32-x64/*" -DestinationPath "out/wfmarketparser-win32-x64.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            out/wfmarketparser-win32-x64.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
