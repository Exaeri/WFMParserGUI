name: Release WFMParserGUI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm install

      - name: Install WFMarketApiJS dependencies
        run: npm install
        working-directory: WFMarketApiJS

      - name: Build packaged app
        run: npm run package

      - name: Archive packaged build
        shell: powershell
        run: |
          Compress-Archive -Path "out/wfmarketparser-win32-x64/*" -DestinationPath "out/wfmarketparser-win32-x64.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            out/wfmarketparser-win32-x64.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
